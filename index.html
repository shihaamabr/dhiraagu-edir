<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Dir</title>
    <meta name="description" content="Dhiraagu Directory Lookup - Search any phone number instantly">
    <meta property="og:title" content="E-Dir">
    <meta property="og:description" content="Dhiraagu Directory Lookup - Search any phone number instantly">
    <meta property="og:image" content="og-image.svg">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --orange: #ffa31a;
            --orange-hover: #ffb84d;
            --gray: #808080;
        }

        /* Light theme (default) */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-card: #ffffff;
            --text-primary: #1b1b1b;
            --text-secondary: #808080;
            --shadow: rgba(0, 0, 0, 0.1);
            --shadow-elevated: rgba(0, 0, 0, 0.15);
            --border: #e0e0e0;
        }

        /* Dark theme */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #1b1b1b;
                --bg-secondary: #292929;
                --bg-card: #292929;
                --text-primary: #ffffff;
                --text-secondary: #808080;
                --shadow: rgba(0, 0, 0, 0.3);
                --shadow-elevated: rgba(0, 0, 0, 0.5);
                --border: #3a3a3a;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 20px var(--shadow);
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--orange), #ff8c00);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon .material-icons {
            font-size: 28px;
            color: white;
        }

        h1 {
            font-size: 32px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        .input-group .material-icons {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            transition: color 0.2s ease;
        }

        .input-group input {
            width: 100%;
            padding: 16px 16px 16px 52px;
            font-size: 16px;
            font-family: 'Roboto', sans-serif;
            border: 2px solid var(--border);
            border-radius: 12px;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s ease;
        }

        .input-group input::placeholder {
            color: var(--text-secondary);
        }

        .input-group input:focus {
            border-color: var(--orange);
            background-color: var(--bg-card);
        }

        .input-group input:focus + .material-icons,
        .input-group:focus-within .material-icons {
            color: var(--orange);
        }

        .btn {
            width: 100%;
            padding: 16px 24px;
            font-size: 16px;
            font-weight: 500;
            font-family: 'Roboto', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--orange), #ff8c00);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 163, 26, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 163, 26, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .results {
            margin-top: 24px;
            display: none;
        }

        .results.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid var(--orange);
        }

        .result-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .result-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .result-item:first-child {
            padding-top: 0;
        }

        .result-item .material-icons {
            color: var(--orange);
            font-size: 20px;
            margin-top: 2px;
        }

        .result-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .result-value {
            font-size: 16px;
            color: var(--text-primary);
            word-break: break-word;
        }

        .error-message {
            background-color: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #f44336;
        }

        .error-message .material-icons {
            font-size: 24px;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">
                    <div class="logo-icon">
                        <span class="material-icons">contacts</span>
                    </div>
                    <h1>E-Dir</h1>
                </div>
                <p class="subtitle">Dhiraagu Directory Lookup</p>
            </div>

            <form id="searchForm">
                <div class="input-group">
                    <input
                        type="tel"
                        id="phoneNumber"
                        placeholder="Enter phone number"
                        autocomplete="tel"
                        required
                    >
                    <span class="material-icons">phone</span>
                </div>

                <button type="submit" class="btn btn-primary" id="searchBtn">
                    <span class="material-icons">search</span>
                    <span>Search</span>
                </button>
            </form>

            <div class="results" id="results"></div>
        </div>

    </div>

    <script>
        const form = document.getElementById('searchForm');
        const phoneInput = document.getElementById('phoneNumber');
        const searchBtn = document.getElementById('searchBtn');
        const resultsDiv = document.getElementById('results');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const phoneNumber = phoneInput.value.trim();
            if (!phoneNumber) return;

            // Show loading state
            searchBtn.disabled = true;
            searchBtn.innerHTML = '<div class="spinner"></div><span>Searching...</span>';
            resultsDiv.classList.remove('show');

            try {
                const response = await fetch(`https://dhiraagu-edir-proxy.shihaam.me/${encodeURIComponent(phoneNumber)}`);
                const data = await response.json();

                if (response.ok && data && data.dirEnquiryEntry) {
                    if (data.dirEnquiryEntry === 'Number not found') {
                        displayError('Number not found');
                    } else {
                        displayResult(data.dirEnquiryEntry);
                    }
                } else {
                    displayError('No results found');
                }
            } catch (error) {
                displayError('Failed to fetch data. Please try again.');
            } finally {
                searchBtn.disabled = false;
                searchBtn.innerHTML = '<span class="material-icons">search</span><span>Search</span>';
            }
        });

        function displayResult(entry) {
            const html = `
                <div class="result-card">
                    <div class="result-item">
                        <span class="material-icons">person</span>
                        <div>
                            <div class="result-label">Directory Entry</div>
                            <div class="result-value">${escapeHtml(entry)}</div>
                        </div>
                    </div>
                </div>
            `;
            resultsDiv.innerHTML = html;
            resultsDiv.classList.add('show');
        }

        function displayError(message) {
            resultsDiv.innerHTML = `
                <div class="error-message">
                    <span class="material-icons">error</span>
                    <span>${escapeHtml(message)}</span>
                </div>
            `;
            resultsDiv.classList.add('show');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
